  <title>Embarca Nation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Space Grotesk"', 'sans-serif'],
            pixel: ['VT323', 'monospace']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=VT323&display=swap"
    rel="stylesheet">
  <style>
    html,
    body {
      height: auto;
      min-height: 100%;
      /* Prevent horizontal scroll from marquees */
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #ffffff;
      color: #000;
      min-height: 100vh;
    }

    @media (min-width: 768px) {
      body {
        cursor: none;
      }
    }

    .font-pixel {
      font-family: 'VT323', monospace;
    }

    /* Custom scrollbar for the raw feel */
    ::-webkit-scrollbar {
      width: 12px;
      background: #fdfdfd;
    }

    /* Ocultar barra de scroll horizontal en Windows */
    ::-webkit-scrollbar:horizontal {
      display: none;
    }

    ::-webkit-scrollbar-thumb {
      background: #a3a3a3;
      border: 2px solid #fdfdfd;
    }

    /* Hides scrollbar but allows scrolling */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    /* Utilities for the cutout effects */
    .text-cutout {
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      background-image: inherit;
    }

    .mix-blend-hard-light {
      mix-blend-mode: hard-light;
    }

    .image-pixelated {
      image-rendering: pixelated;
    }

    /* Disruptive Additions */
    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .animate-scroll {
      animation: scroll 80s linear infinite;
    }

    @keyframes scan {
      0% {
        transform: translateY(-100%);
        opacity: 0;
      }

      50% {
        opacity: 0.5;
      }

      100% {
        transform: translateY(200%);
        opacity: 0;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-scan {
      animation: scan 3s linear infinite;
    }

    .bg-noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
    }

    .clip-corner {
      clip-path: polygon(0 0,
          100% 0,
          100% 85%,
          95% 100%,
          0 100%);
    }
  </style>
